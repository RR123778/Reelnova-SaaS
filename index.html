<!DOCTYPE html>
<html>
<head>
  <title>ReelNova SaaS 💰</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial; background:#f5f5f5; margin:0;">

<header style="background:#ff4081; color:white; padding:15px; text-align:center;">
  <h2>ReelNova SaaS Platform 🚀</h2>
</header>

<div style="padding:15px;">

  <!-- BLOG -->
  <div style="background:white; padding:15px; margin-bottom:15px; border-radius:10px;">
    <h3>Create Viral Post</h3>
    <input id="topic" placeholder="Enter topic" style="width:100%; padding:10px;"><br><br>
    <button onclick="createPost()">Generate + Share</button>
  </div>

  <!-- EARNINGS -->
  <div style="background:white; padding:15px; margin-bottom:15px; border-radius:10px;">
    <h3>Your Earnings 💰</h3>
    <p id="earnings">₹0</p>
  </div>

  <!-- ADMIN -->
  <div style="background:white; padding:15px; border-radius:10px;">
    <h3>Admin Panel</h3>
    <button onclick="loadUsers()">View Users</button>
    <div id="users"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;

// 🧠 Product List
const products = [
  {
    name: "Stylish Saree",
    price: "₹299",
    link: "https://yourdomain.com/go?url=https://meesho.com/product1"
  },
  {
    name: "Kurti Set",
    price: "₹399",
    link: "https://yourdomain.com/go?url=https://meesho.com/product2"
  },
  {
    name: "Men T-Shirt Combo",
    price: "₹499",
    link: "https://yourdomain.com/go?url=https://meesho.com/product3"
  }
];

// 🎯 Post Generator
window.createPost = async function(){
  if(!currentUser){
    alert("Login first");
    return;
  }

  let topic = document.getElementById("topic").value;
  let p = products[Math.floor(Math.random()*products.length)];

  let msg = `🔥 ${topic || p.name} trending 😍\n\n💸 Price: ${p.price}\n\n👉 Buy Now: ${p.link}\n\n⚡ Limited Offer!`;

  await addDoc(collection(db, "posts"), {
    user: currentUser.uid,
    content: msg
  });

  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// 📊 Track Click
window.trackClick = async function(){
  if(!currentUser) return;

  const ref = doc(db, "users", currentUser.uid);
  const snap = await getDoc(ref);

  let clicks = snap.data().clicks + 1;
  let earnings = clicks * 2;

  await updateDoc(ref, { clicks, earnings });

  document.getElementById("earnings").innerText = "₹"+earnings;
}

// 💰 Load Earnings
async function loadEarnings(){
  const snap = await getDoc(doc(db, "users", currentUser.uid));
  document.getElementById("earnings").innerText = "₹"+snap.data().earnings;
}

// 👨‍💻 Admin
window.loadUsers = async function(){
  const querySnapshot = await getDocs(collection(db, "users"));

  let html="";
  querySnapshot.forEach(doc=>{
    let d = doc.data();
    html += `<p>${d.email} - ₹${d.earnings} (${d.clicks} clicks)</p>`;
  });

  document.getElementById("users").innerHTML = html;
}

// 🤖 Auto Post हर 2 घंटे
setInterval(()=>{
  let p = products[Math.floor(Math.random()*products.length)];

  let msg = `🔥 ${p.name} trending 😍\n👉 Buy Now: ${p.link}`;

  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}, 7200000);

</script>

</body>
</html>
