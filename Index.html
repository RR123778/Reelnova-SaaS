<!DOCTYPE html><html>
<head>
<title>ReelNova SaaS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head><body style="font-family:Arial;background:#f5f5f5;margin:0;"><header style="background:#ff4081;color:white;padding:15px;text-align:center;">
<h2>ReelNova SaaS Platform</h2>
</header><div style="padding:15px;"><div style="background:white;padding:10px;margin-bottom:10px;border-radius:10px;">
<b>Select Language:</b>
<button onclick="setLang('hi')">Hindi</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('hinglish')">Hinglish</button>
<button onclick="setLang('bn')">Bengali</button>
<button onclick="setLang('mr')">Marathi</button>
</div><div style="background:white;padding:15px;margin-bottom:15px;border-radius:10px;">
<h3>Create Content</h3>
<input id="topic" placeholder="Enter topic" style="width:100%;padding:10px;"><br><br>
<button onclick="generatePost()">Generate Post</button>
<button onclick="generateBlog()">Generate Blog</button>
<button onclick="generateKeywords()">SEO Keywords</button>
</div><div style="background:white;padding:15px;margin-bottom:15px;border-radius:10px;">
<h3>Viral Post</h3>
<p id="postOutput"></p>
<button onclick="copyPost()">Copy</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="goBlog()">Visit Blog</button>
<button onclick="joinChannel()">Join Channel</button>
</div><div style="background:white;padding:15px;margin-bottom:15px;border-radius:10px;">
<h3>Blog Content</h3>
<textarea id="blogOutput" style="width:100%;height:200px;"></textarea><br><br>
<button onclick="copyBlog()">Copy Blog</button>
</div><div style="background:white;padding:15px;border-radius:10px;">
<h3>SEO Keywords</h3>
<p id="keywords"></p>
</div></div><script>

const BLOG_URL="https://fcramjee.blogspot.com";
const CHANNEL_URL="https://whatsapp.com/channel/0029VbCOdaTKrWR0cuReYb2y";

let currentPost="";

function setLang(l){
alert("Language: "+l);
}

function detectType(topic){
topic=topic.toLowerCase();
if(topic.includes("earn")||topic.includes("paisa")||topic.includes("job")) return "earning";
if(topic.includes("health")||topic.includes("ilaj")||topic.includes("pet")) return "health";
if(topic.includes("news")||topic.includes("today")||topic.includes("update")) return "news";
return "deal";
}

function generatePost(){
let topic=document.getElementById("topic").value||"Hot Deal";
let type=detectType(topic);

if(type==="earning"){
currentPost="💰 "+topic+"\n\nघर बैठे कमाई का मौका\n\n👉 "+BLOG_URL+"\n\n📢 "+CHANNEL_URL;
}
else if(type==="health"){
currentPost="🏥 "+topic+"\n\nआसान घरेलू उपाय\n\n👉 "+BLOG_URL+"\n\n📢 "+CHANNEL_URL;
}
else if(type==="news"){
currentPost="📰 "+topic+"\n\nआज की बड़ी खबर\n\n👉 "+BLOG_URL+"\n\n📢 "+CHANNEL_URL;
}
else{
currentPost="🔥 "+topic+" 😍\n\nआज का सबसे सस्ता ऑफर\n\n👉 "+BLOG_URL+"\n\n📢 "+CHANNEL_URL;
}

document.getElementById("postOutput").innerText=currentPost;
}

function generateBlog(){
let topic=document.getElementById("topic").value||"Best Deal";

document.getElementById("blogOutput").value=
topic+"\n\n👉 पूरी जानकारी:\n"+BLOG_URL+"\n\n📢 "+CHANNEL_URL;
}

function generateKeywords(){
let topic=document.getElementById("topic").value||"deal";

document.getElementById("keywords").innerText=
topic+" under 299, "+topic+" deal, cheap "+topic+", buy "+topic;
}

function copyPost(){
navigator.clipboard.writeText(currentPost);
alert("Copied");
}

function copyBlog(){
navigator.clipboard.writeText(document.getElementById("blogOutput").value);
alert("Copied");
}

function shareWhatsApp(){
window.open("https://wa.me/?text="+encodeURIComponent(currentPost));
}

function goBlog(){
window.open(BLOG_URL);
}

function joinChannel(){
window.open(CHANNEL_URL);
}

setInterval(generatePost,15000);

</script></body>
</html>
